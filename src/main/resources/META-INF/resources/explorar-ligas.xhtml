<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/WEB-INF/template/layout.xhtml">

    <ui:define name="conteudo">
        
        <h:form id="formExplorar">
            <p:growl id="messages" showDetail="true" life="5000"/>
            
            <div class="flex flex-column md:flex-row justify-content-between align-items-start md:align-items-center mb-4 gap-3">
                <div>
                    <h1 class="text-white text-3xl font-bold m-0"><i class="fas fa-globe text-purple-400 mr-2"></i> Explorar Ligas</h1>
                    <p class="text-gray-400 text-lg mt-1 mb-0">Encontre comunidades ativas e coloque seu time à prova.</p>
                </div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <p:button outcome="/minhas-ligas" value="Minhas Ligas" icon="fas fa-list" 
                              styleClass="ui-button-secondary rounded-btn font-bold flex-1 md:flex-none shadow-2"/>
                              
                    <p:button outcome="/gerenciar-liga" value="Criar Liga" icon="fas fa-plus" 
                              styleClass="ui-button-help rounded-btn font-bold flex-1 md:flex-none shadow-3"/>
                </div>
            </div>

            <div class="bg-glass p-4 border-round-xl shadow-4 mb-4 border-left-3 border-purple-500 flex flex-column md:flex-row align-items-center gap-3">
                <div class="flex-grow-1 w-full relative">
                    <i class="fas fa-search absolute text-gray-400" style="left: 15px; top: 50%; transform: translateY(-50%); z-index: 2;"></i>
                    <p:inputText value="#{explorarLigasBean.termoBusca}" 
                                 placeholder="Digite o nome da liga que deseja encontrar..." 
                                 styleClass="w-full custom-input text-lg pl-5 py-3 border-round-xl shadow-inset-1" />
                </div>
                <div class="w-full md:w-auto">
                    <p:commandButton value="Pesquisar" action="#{explorarLigasBean.pesquisar}" 
                                     update="tabelaLigas messages" 
                                     icon="fas fa-bolt" 
                                     styleClass="w-full ui-button-warning font-bold rounded-btn shadow-3 px-5 py-3 text-lg"/>
                </div>
            </div>

            <div class="bg-glass p-4 border-round-xl shadow-4 h-full relative overflow-hidden">
                <div class="flex justify-content-between align-items-center mb-4">
                    <h3 class="text-white m-0 text-xl">
                        <i class="fas fa-fire text-orange-500 mr-2"></i> 
                        <h:outputText value="#{empty explorarLigasBean.termoBusca ? 'Ligas mais movimentadas' : 'Resultados da busca'}" />
                    </h3>
                </div>

                <p:dataTable id="tabelaLigas" value="#{explorarLigasBean.ligasEncontradas}" var="liga" 
                             styleClass="ui-datatable-sm bg-transparent border-none" 
                             emptyMessage="Nenhuma liga encontrada com este nome."
                             paginator="true" rows="10" paginatorPosition="bottom">
                    
                    <p:column headerText="Informações da Liga" styleClass="bg-transparent text-white border-bottom-1 border-gray-700 border-top-none">
                        <div class="flex align-items-center py-2">
                            <div class="border-circle bg-gray-800 flex align-items-center justify-content-center border-1 border-gray-600 mr-3 hidden sm:flex" 
                                 style="width: 45px; height: 45px; min-width: 45px;">
                                <i class="fas fa-trophy text-xl text-yellow-500"></i>
                            </div>
                            <div>
                                <div class="font-bold text-xl text-white mb-1">#{liga.nome}</div>
                                <div class="text-sm text-gray-400">
                                    <i class="fas fa-shield-alt mr-1 text-xs"></i> Admin: <span class="text-blue-300">#{liga.nomeTimeAdmin}</span>
                                </div>
                            </div>
                        </div>
                    </p:column>
                    
                    <p:column headerText="Tamanho" styleClass="bg-transparent text-white border-bottom-1 border-gray-700 text-center border-top-none hidden md:table-cell" width="120">
                        <span class="bg-bluegray-800 px-3 py-2 border-round-xl text-sm shadow-1 font-bold text-gray-300" title="Times participantes">
                            <i class="fas fa-users mr-2 text-purple-400"></i>#{liga.qtdTimes}
                        </span>
                    </p:column>
                    
                    <p:column styleClass="bg-transparent border-bottom-1 border-gray-700 text-right border-top-none" width="220">
                        
                        <h:panelGroup rendered="#{liga.souAdmin}">
                            <span class="text-blue-400 font-bold text-sm bg-blue-900 px-3 py-2 border-round-lg border-1 border-blue-500">
                                <i class="fas fa-crown mr-1"></i> Minha Liga
                            </span>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not liga.souAdmin and liga.jaParticipa}">
                            <span class="text-green-400 font-bold text-sm bg-green-900 px-3 py-2 border-round-lg border-1 border-green-500">
                                <i class="fas fa-check-circle mr-1"></i> Já Participo
                            </span>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not liga.souAdmin and not liga.jaParticipa and liga.convitePendente}">
                            <span class="text-yellow-400 font-bold text-sm">
                                <i class="fas fa-clock mr-1"></i> Aguardando
                            </span>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not liga.souAdmin and not liga.jaParticipa and not liga.convitePendente}">
                            <p:commandButton value="Participar" icon="fas fa-sign-in-alt" 
                                             action="#{explorarLigasBean.solicitarParticipacao(liga)}"
                                             update="tabelaLigas :formExplorar:messages"
                                             styleClass="ui-button-outlined ui-button-help rounded-btn font-bold text-sm"/>
                        </h:panelGroup>

                    </p:column>
                </p:dataTable>
            </div>
            
        </h:form>

    </ui:define>
</ui:composition>
