<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Arena Match - Login</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <h:outputStylesheet library="css" name="styles.css" />
    <link href="https://unpkg.com/primeflex@3.1.2/primeflex.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        body { 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* Mantemos o estilo visual aqui, mas o TAMANHO vamos forçar no HTML abaixo */
        .login-card { 
            padding: 40px; 
            border-radius: 16px; 
            position: relative; 
            overflow: hidden;
            background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .login-card::before { 
            content: ''; position: absolute; top: 0; left: 0; 
            width: 100%; height: 4px; 
            background: linear-gradient(90deg, #0ea5e9, #22d3ee); 
        }

        /* Input Customizado */
        body .ui-inputfield {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            color: #fff;
            padding-left: 2.5rem !important;
        }
        body .ui-inputfield:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }
        .ui-input-icon-left > i { color: #94a3b8; }
    </style>
</h:head>

<h:body>
    <h:form>
        <p:growl id="msgs" showDetail="true" />

        <div class="login-card" style="max-width: 600px !important; width: 90%;">
            
            <div class="text-center mb-5">
                <div class="text-3xl font-bold text-neon" style="font-size: 2rem;">
                    <i class="fas fa-trophy mr-2"></i> ARENA <span class="text-white ml-2">MATCH</span>
                </div>
                <div class="text-gray-400 text-sm mt-2">Entre e encontre seu próximo desafio.</div>
            </div>

            <div class="field mb-4">
                <span class="ui-input-icon-left w-full">
                    <i class="pi pi-user" />
                    <p:inputText value="#{loginBean.email}" placeholder="E-mail" styleClass="w-full" required="true" requiredMessage="E-mail obrigatório."/>
                </span>
            </div>

            <div class="field mb-4">
                <span class="ui-input-icon-left w-full">
                    <i class="pi pi-lock" />
                    <p:password value="#{loginBean.senha}" placeholder="Senha" styleClass="w-full" required="true" requiredMessage="Senha obrigatória." toggleMask="true"/>
                </span>
            </div>

            <div class="flex justify-content-between align-items-center mb-4 text-sm">
                <div class="flex align-items-center">
                    <p:selectBooleanCheckbox id="lembrar" itemLabel="Lembrar" styleClass="mr-2"/>
                </div>
                <a href="recuperar-senha.xhtml" class="text-neon no-underline hover:text-white font-bold">Esqueci a senha</a>
            </div>

            <p:commandButton value="ENTRAR EM CAMPO" action="#{loginBean.logar}" update="msgs" icon="pi pi-sign-in"
                             styleClass="w-full rounded-btn font-bold border-none shadow-4" 
                             style="background: linear-gradient(90deg, #0ea5e9 0%, #0284c7 100%); padding: 12px 0;"/>

            <div class="text-center mt-5 text-sm text-gray-400">
                Não tem time cadastrado? <br/>
                <a href="cadastro.xhtml" class="text-neon font-bold no-underline hover:text-white">Crie sua conta agora</a>
            </div>
            
        </div>
    </h:form>
</h:body>
</html>
