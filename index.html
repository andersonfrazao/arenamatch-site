<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Match - Em Breve</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            /* Fundo escuro premium */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        
        /* Efeito de Vidro (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Brilho Neon para a marca */
        .neon-text {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        
        /* Fonte digital para o contador */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        .font-digital {
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-white overflow-hidden relative">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>

    <div class="glass-panel rounded-3xl p-8 md:p-14 max-w-2xl w-full text-center relative z-10 transform transition-all hover:scale-[1.01] duration-500">
        
        <div class="mb-8">
            <i class="fas fa-trophy text-7xl text-blue-500 mb-4 drop-shadow-lg transform hover:rotate-12 transition-transform duration-300"></i>
            <h1 class="text-5xl md:text-6xl font-black tracking-tight">
                <span class="text-blue-500 neon-text">Arena</span><span class="text-white">Match</span>
            </h1>
        </div>

        <div class="mb-12 space-y-4">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-200">
                O jogo está prestes a começar!
            </h2>
            <div class="w-16 h-1 bg-blue-500 mx-auto rounded-full mb-4"></div>
            <p class="text-gray-400 text-lg md:text-xl max-w-lg mx-auto leading-relaxed">
                O maior sistema de agendamento de jogos da várzea está em construção. Nossa equipe está aquecendo no vestiário para entregar a plataforma definitiva para o seu time.
            </p>
        </div>

        <div class="inline-block bg-slate-900/80 border border-slate-700/50 rounded-2xl p-6 shadow-inner w-full max-w-sm mx-auto">
            <div class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
                <i class="fas fa-eye text-blue-400"></i> Você é o visitante número
            </div>
            
            <div class="bg-black/50 border border-blue-900/30 rounded-xl p-4 flex justify-center items-center">
                <span id="contador-visitas" class="text-5xl font-digital text-blue-400 tracking-widest neon-text">
                    0000
                </span>
            </div>
        </div>

        <div class="mt-12 text-xs text-gray-500 font-semibold uppercase tracking-wider">
            <i class="fas fa-hammer mr-1"></i> Arena Match © 2026 - Em Breve
        </div>
    </div>

<script>
        document.addEventListener("DOMContentLoaded", function() {
            const elementoContador = document.getElementById("contador-visitas");
            
            // Efeito visual de carregando enquanto busca o número real no servidor
            elementoContador.innerText = "LOAD..";

            // Chamada para a API gratuita de contagem global
            // O parâmetro "/up" garante que cada carregamento da página some +1 no contador oficial
            fetch('https://api.counterapi.dev/v1/arenamatch-app-br/visitas/up')
                .then(response => response.json())
                .then(data => {
                    // Extrai o número global e real de visitantes
                    const totalVisitas = data.count;
                    
                    // Formata com zeros à esquerda para manter o visual digital (ex: 000001)
                    elementoContador.innerText = totalVisitas.toString().padStart(6, '0');
                })
                .catch(error => {
                    console.error('Erro de conexão com o contador:', error);
                    elementoContador.innerText = "------";
                });
        });
    </script>
</body>
</html>
