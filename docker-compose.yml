version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: arenamatch
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: zu0EiphaWee6AechUngoo2ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: . # Manda o Docker construir a imagem usando o Dockerfile da mesma pasta
    ports:
      - "80:8080" # Liga a porta 80 da internet na porta 8080 do seu app
    environment:
      - SPRING_PROFILES_ACTIVE=prod # <--- AQUI ESTÁ O SEGREDO!
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/arenamatch_prod
      - SPRING_DATASOURCE_USERNAME=arenamatch
      - SPRING_DATASOURCE_PASSWORD=zu0EiphaWee6AechUngoo2ai
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data: